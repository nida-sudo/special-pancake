name: Ruh E2E Daily

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC. Edit the cron line below if the team timezone changes.
    - cron: "30 3 * * *"
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "true"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: nida@ruh.ai,aakash@ruh.ai
          BASE_URL: https://app-qa.ruh.ai
          AUTH_URL: https://ruh-auth-qa.ruh.ai
          TEST_USER_EMAIL: ${{ secrets.RUH_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.RUH_TEST_USER_PASSWORD }}
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (traces, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
